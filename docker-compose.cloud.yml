services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: optimizer
      MYSQL_USER: optimizer
      MYSQL_PASSWORD: optimizer
      MYSQL_ROOT_PASSWORD: optimizer-root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uoptimizer -poptimizer --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:53306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  optimizer-api:
    build: .
    command: node dist/index.js
    env_file:
      - .env.cloud.example
    environment:
      CLOUD_PROVIDER: local
      QUEUE_PROVIDER: local
      STATE_STORE_PROVIDER: mysql
      DATABASE_URL: mysql://optimizer:optimizer@mysql:3306/optimizer
      BILLING_MODE: mock
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    depends_on:
      mysql:
        condition: service_healthy

  optimizer-worker:
    build: .
    command: node dist/worker/run-worker.js
    env_file:
      - .env.cloud.example
    environment:
      CLOUD_PROVIDER: local
      QUEUE_PROVIDER: local
      STATE_STORE_PROVIDER: mysql
      DATABASE_URL: mysql://optimizer:optimizer@mysql:3306/optimizer
      BILLING_MODE: mock
      WORKER_ID: worker-compose-1
      WORKER_CONCURRENCY: 1
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    depends_on:
      mysql:
        condition: service_healthy
      optimizer-api:
        condition: service_started

volumes:
  mysql-data:
