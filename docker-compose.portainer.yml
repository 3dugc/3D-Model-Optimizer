services:
  optimizer-api:
    image: hkccr.ccs.tencentyun.com/plugins/3d-model-optimizer:${OPTIMIZER_IMAGE_TAG:-latest}
    networks:
      - proxy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_KEY: ${OPTIMIZER_API_KEY:-}
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-tencent}
      QUEUE_PROVIDER: ${QUEUE_PROVIDER:-tdmq-cmq}
      STATE_STORE_PROVIDER: ${STATE_STORE_PROVIDER:-mysql}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      CLOUD_LOCAL_OBJECT_ROOT: /app/data/cloud/objects
      JOB_STORE_PATH: /app/data/cloud/jobs.json
      ORDER_STORE_PATH: /app/data/cloud/orders.json
      TENCENT_REGION: ap-nanjing
      COS_INPUT_BUCKET: model-optimizer-1251022382
      COS_OUTPUT_BUCKET: model-optimizer-1251022382
      QUEUE_ENDPOINT: ${QUEUE_ENDPOINT:-https://cmq-nj.public.tencenttdmq.com}
      QUEUE_NAME: ${QUEUE_NAME:-optimizer-jobs}
      QUEUE_POLLING_WAIT_SECONDS: 10
      DEFAULT_TASK_TYPE: model.optimize
      JOB_MAX_ATTEMPTS: 3
      JOB_TIMEOUT_SECONDS: 1800
      JOB_LEASE_SECONDS: 300
      EXPIRED_JOB_RECOVERY_INTERVAL_SECONDS: 30
      BILLING_MODE: mock
      DEFAULT_JOB_PRICE_CENTS: 800
      CALLBACK_TIMEOUT_SECONDS: 10
      CALLBACK_MAX_ATTEMPTS: 6
    volumes:
      - optimizer-data:/app/data
      - optimizer-temp:/app/temp
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.optimizer-api.rule=Host(`${OPTIMIZER_HOST:-optimizer.7dgame.com}`)
      - traefik.http.routers.optimizer-api.entrypoints=websecure
      - traefik.http.routers.optimizer-api.tls=true
      - traefik.http.routers.optimizer-api.tls.certresolver=letsencrypt
      - traefik.http.routers.optimizer-api.service=optimizer-api
      - traefik.http.services.optimizer-api.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  optimizer-dispatcher:
    image: hkccr.ccs.tencentyun.com/plugins/3d-model-optimizer:${OPTIMIZER_IMAGE_TAG:-latest}
    command: node dist/dispatcher/run-dispatcher.js
    networks:
      - proxy
    environment:
      NODE_ENV: production
      CLOUD_PROVIDER: tencent
      STATE_STORE_PROVIDER: mysql
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      TENCENT_REGION: ap-nanjing
      DISPATCHER_PROVIDER: tencent-as
      DISPATCHER_AS_GROUP_IDS: ${DISPATCHER_AS_GROUP_IDS:-asg-pj6qaput}
      DISPATCHER_TASK_TYPE: ${DISPATCHER_TASK_TYPE:-model.optimize}
      DISPATCHER_INTERVAL_SECONDS: ${DISPATCHER_INTERVAL_SECONDS:-30}
      DISPATCHER_SLOTS_PER_INSTANCE: ${DISPATCHER_SLOTS_PER_INSTANCE:-1}
      DISPATCHER_MIN_INSTANCES: ${DISPATCHER_MIN_INSTANCES:-0}
      DISPATCHER_MAX_INSTANCES: ${DISPATCHER_MAX_INSTANCES:-3}
      DISPATCHER_DRY_RUN: ${DISPATCHER_DRY_RUN:-false}
    restart: unless-stopped

volumes:
  optimizer-data:
  optimizer-temp:

networks:
  proxy:
    external: true
