name: Docker Build & Push

on:
  push:
    branches: [develop, main, publish]
  pull_request:
    branches: [develop, main, publish]
  workflow_dispatch:

env:
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com
  TENCENT_IMAGE_NAME: plugins/3d-model-optimizer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Tencent registry credentials
        id: tencent-registry
        if: github.event_name != 'pull_request'
        env:
          TENCENT_REGISTRY_USERNAME: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          TENCENT_REGISTRY_PASSWORD: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
        run: |
          if [ -n "$TENCENT_REGISTRY_USERNAME" ] && [ -n "$TENCENT_REGISTRY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tencent registry push skipped because TENCENT_REGISTRY_USERNAME/TENCENT_REGISTRY_PASSWORD are not configured."
          fi

      - name: Log in to Tencent Container Registry
        id: tencent-login
        if: github.event_name != 'pull_request' && steps.tencent-registry.outputs.enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Note Tencent registry login failure
        if: github.event_name != 'pull_request' && steps.tencent-registry.outputs.enabled == 'true' && steps.tencent-login.outcome == 'failure'
        run: echo "::notice::Tencent registry push skipped because login failed."

      - name: Extract Tencent metadata
        id: meta-tencent
        if: github.event_name != 'pull_request' && steps.tencent-registry.outputs.enabled == 'true' && steps.tencent-login.outcome == 'success'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.TENCENT_REGISTRY }}/${{ env.TENCENT_IMAGE_NAME }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}

      - name: Build and push Tencent image
        if: github.event_name != 'pull_request' && steps.tencent-registry.outputs.enabled == 'true' && steps.tencent-login.outcome == 'success'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-tencent.outputs.tags }}
          labels: ${{ steps.meta-tencent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete Tencent short-hash tags
        if: github.event_name != 'pull_request' && steps.tencent-registry.outputs.enabled == 'true' && steps.tencent-login.outcome == 'success'
        env:
          TENCENT_REGISTRY_USERNAME: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          TENCENT_REGISTRY_PASSWORD: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
          DRY_RUN: 'false'
        run: node .github/scripts/cleanup-tencent-sha-tags.mjs
