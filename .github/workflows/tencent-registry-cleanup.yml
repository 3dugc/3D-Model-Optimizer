name: Tencent Registry Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List tags without deleting them'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com
  TENCENT_IMAGE_NAME: plugins/3d-model-optimizer

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete short-hash tags
        env:
          TENCENT_REGISTRY_USERNAME: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          TENCENT_REGISTRY_PASSWORD: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node .github/scripts/cleanup-tencent-sha-tags.mjs
